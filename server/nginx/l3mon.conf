# NGINX Configuration for L3MON - Secure Reverse Proxy (Production)
# Place this in /etc/nginx/sites-available/l3mon.conf (or sites-enabled)

# Web UI (Admin Panel) - runs on localhost:22533
upstream l3mon_web {
    server 127.0.0.1:22533;
}

# Control Channel for Android clients (Socket.IO) - runs on localhost:22222
upstream l3mon_control {
    server 127.0.0.1:22222;
}

# ==================== HTTP -> HTTPS REDIRECT ====================
server {
    listen 80;
    listen [::]:80;
    server_name l3mon.example.com;           # <-- CHANGE TO YOUR DOMAIN
    server_name control.l3mon.example.com;   # optional: separate subdomain for control

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== MAIN WEB UI (HTTPS) ====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name l3mon.example.com;   # <-- CHANGE TO YOUR DOMAIN

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/l3mon.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/l3mon.example.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    location /login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://l3mon_web;
    }

    location / {
        proxy_pass http://l3mon_web;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://l3mon_web;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. { deny all; }
}

# ==================== CONTROL CHANNEL (for Android) ====================
# Recommended: use a subdomain so you only expose port 443
# Android clients will connect to wss://control.l3mon.example.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name control.l3mon.example.com;   # <-- CHANGE (or use same domain + path)

    ssl_certificate /etc/letsencrypt/live/l3mon.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/l3mon.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Important: WebSocket support for Socket.IO
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_read_timeout 86400;

    location / {
        proxy_pass http://l3mon_control;
    }
}

